<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1280" role="img" aria-labelledby="title desc">
  <title id="title">Blade Runner style neon placeholder</title>
  <desc id="desc">A pink neon cinema facade with grid windows and glowing accents.</desc>
  <defs>
