  </defs>
  <rect width="900" height="1280" fill="url(#bg)"/>
  <rect x="76" y="88" width="748" height="1104" rx="28" fill="rgba(9,7,8,.36)" stroke="#ffb0cf" stroke-opacity=".28"/>
